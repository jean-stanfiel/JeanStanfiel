<!DOCTYPE html>
<html lang="es">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="tarjeta">
        <h1 id="titulo">El Número Mágico</h1>
            <a> gola</a>
        <p id="parrafo">Adivina el número entre 1 y 100.</p>
        <br> 
        <br>
        
        <div id="intentos">Intentos restantes: 3</div>
        
        <input type="number" id="numero" min="1" max="100">
        
        <button id="boton" class="btn btn-primary" onclick="adivinar()">Adivinar</button>
        
        <button class="btn btn-secondary">Reiniciar</button>
        
        <div id="mensaje" class="mt-3 fw-bold"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
